name: Intel macOS DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  macos-intel:
    name: Build Intel DMG
    runs-on: macos-15-intel
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Determine build version
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(git describe --tags --always)"
          version="${version//\//-}"
          echo "version=${version}" | tee -a "${GITHUB_OUTPUT}"

      - name: Install build and packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install libusb fftw qt@6 cmake binutils create-dmg dylibbundler

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            -S . \
            -B build \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)" \
            -DBUILD_MACOSX_BUNDLE=ON

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Bundle runtime dependencies
        shell: bash
        run: |
          set -euo pipefail

          app_path="${GITHUB_WORKSPACE}/build/openhantek/OpenHantek.app"
          binary_path="${app_path}/Contents/MacOS/OpenHantek"
          frameworks_path="${app_path}/Contents/Frameworks"

          test -d "${app_path}"
          test -x "${binary_path}"

          export PATH="$(brew --prefix qt@6)/bin:${PATH}"
          macdeployqt "${app_path}" -always-overwrite -verbose=2

          mkdir -p "${frameworks_path}"

          dylibbundler \
            -b \
            -cd \
            -of \
            -x "${binary_path}" \
            -d "${frameworks_path}" \
            -p "@executable_path/../Frameworks/" \
            -s "$(brew --prefix libusb)/lib" \
            -s "$(brew --prefix fftw)/lib"

          xattr -cr "${app_path}"
          codesign --force --deep --sign - "${app_path}"
          codesign --verify --deep --strict --verbose=2 "${app_path}"

      - name: Verify Intel architecture and portability
        shell: bash
        run: |
          set -euo pipefail

          app_path="${GITHUB_WORKSPACE}/build/openhantek/OpenHantek.app"
          binary_path="${app_path}/Contents/MacOS/OpenHantek"

          file "${binary_path}"
          architecture="$(lipo -archs "${binary_path}")"
          if [[ "${architecture}" != "x86_64" ]]; then
            echo "::error::Expected x86_64, found ${architecture}"
            exit 1
          fi

          unbundled=0
          while IFS= read -r -d '' candidate; do
            if [[ "$(file -b "${candidate}")" != *"Mach-O"* ]]; then
              continue
            fi

            relative_candidate="${candidate#"${GITHUB_WORKSPACE}/"}"
            while IFS= read -r dependency; do
              dependency="${dependency#"${dependency%%[![:space:]]*}"}"
              dependency="${dependency%% (*}"

              case "${dependency}" in
                ""|@*|/usr/lib/*|/System/Library/*)
                  ;;
                *)
                  echo "Unbundled dependency in ${relative_candidate}: ${dependency}"
                  echo "::error file=${relative_candidate}::Unbundled dependency: ${dependency}"
                  unbundled=1
                  ;;
              esac
            done < <(otool -L "${candidate}" | tail -n +2)
          done < <(find "${app_path}" -type f -print0)

          if [[ "${unbundled}" -ne 0 ]]; then
            exit 1
          fi

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail

          app_path="${GITHUB_WORKSPACE}/build/openhantek/OpenHantek.app"
          version="${{ steps.metadata.outputs.version }}"
          output_dir="${GITHUB_WORKSPACE}/dist"
          dmg_path="${output_dir}/OpenHantek-${version}-macos-x86_64.dmg"

          mkdir -p "${output_dir}"
          create-dmg \
            --volname "OpenHantek" \
            --volicon "${GITHUB_WORKSPACE}/openhantek/res/images/OpenHantek.icns" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "OpenHantek.app" 200 190 \
            --hide-extension "OpenHantek.app" \
            --app-drop-link 600 185 \
            --eula "${GITHUB_WORKSPACE}/LICENSE" \
            --skip-jenkins \
            "${dmg_path}" \
            "${app_path}"

          shasum -a 256 "${dmg_path}" > "${output_dir}/SHA256SUMS.txt"
          ls -lh "${output_dir}"

      - name: Upload Intel DMG
        uses: actions/upload-artifact@v7
        with:
          name: OpenHantek-${{ steps.metadata.outputs.version }}-macos-x86_64
          path: |
            dist/*.dmg
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
